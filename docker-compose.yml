services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rag_eval
      POSTGRES_PASSWORD: rag_eval
      POSTGRES_DB: rag_eval
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag_eval"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  eval-service:
    build:
      context: ./apps/service/eval
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - ./apps/service/eval/.env
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
  redis_data:
